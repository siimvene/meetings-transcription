syntax = "proto3";

package audio_ingestion;

// Service for streaming per-participant audio from the Teams bot to the on-premise server.
service AudioIngestion {
    // Stream audio chunks for a single participant in a meeting.
    // The bot opens one stream per participant (or per room device).
    rpc StreamAudio(stream AudioChunk) returns (StreamResult);

    // Signal that a meeting has ended. Triggers post-meeting summarization.
    rpc EndMeeting(EndMeetingRequest) returns (EndMeetingResult);
}

message AudioChunk {
    // Teams call ID (unique per meeting)
    string meeting_id = 1;

    // Participant identifier (MSI or AAD object ID)
    string participant_id = 2;

    // Display name from Teams roster
    string display_name = 3;

    // AAD user ID of the person who invited the bot (transcript owner)
    string owner_aad_id = 4;

    // Raw audio: 16kHz, 16-bit signed PCM, mono, little-endian
    // Teams provides 20ms frames = 640 bytes each, 50 frames/sec
    bytes pcm_data = 5;

    // Timestamp in milliseconds from meeting start
    int64 timestamp_ms = 6;

    // True if this participant is a Teams Room device (shared mic, needs Sortformer)
    bool is_room_device = 7;

    // Email address of the participant (if available from roster)
    string email = 8;

    // Meeting title (sent in the first chunk only)
    string meeting_title = 9;
}

message StreamResult {
    bool ok = 1;
    string message = 2;
    // Number of audio chunks received
    int64 chunks_received = 3;
}

message ChatMessage {
    string sender_name = 1;
    string text = 2;
    string timestamp = 3;  // ISO 8601
}

message EndMeetingRequest {
    string meeting_id = 1;
    string owner_aad_id = 2;
    // Chat messages from the meeting thread, fetched by the bot on meeting end
    repeated ChatMessage chat_messages = 3;
}

message EndMeetingResult {
    bool ok = 1;
    string message = 2;
}
