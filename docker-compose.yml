services:

  # --- ASR & Diarization ---

  transcription:
    container_name: mt-transcription
    build:
      context: .
      dockerfile: services/transcription/Dockerfile
    ports:
      - "8100:8000"  # Remapped: vLLM already on host port 8000
    volumes:
      - hf-cache:/root/.cache/huggingface/hub
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    env_file:
      - config/.env
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      start_period: 180s
      start_interval: 10s
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # --- Audio Ingestion (receives gRPC streams from Teams bot) ---

  ingestion:
    container_name: mt-ingestion
    build:
      context: .
      dockerfile: services/ingestion/Dockerfile
    ports:
      - "50051:50051"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - config/.env
    depends_on:
      transcription:
        condition: service_healthy
      assembly:
        condition: service_started
    restart: unless-stopped

  # --- Transcript Assembly ---

  assembly:
    container_name: mt-assembly
    build:
      context: .
      dockerfile: services/assembly/Dockerfile
    expose:
      - "8080"
    env_file:
      - config/.env
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # --- Translation ---

  rabbitmq:
    container_name: mt-rabbitmq
    image: rabbitmq:4.2
    environment:
      - RABBITMQ_DEFAULT_USER=${MQ_USERNAME:-user}
      - RABBITMQ_DEFAULT_PASS=${MQ_PASSWORD:-password}
    ports:
      - "5672:5672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      start_period: 30s
      start_interval: 5s
      interval: 30s
      timeout: 15s
      retries: 3
    restart: unless-stopped

  translation-worker:
    container_name: mt-translation-worker
    build:
      context: .
      dockerfile: services/translation-worker/Dockerfile
    env_file:
      - config/.env
    volumes:
      - ./models:/app/models
    entrypoint: ["/bin/sh", "-c", "python main.py --model-name ${NMT_MODEL:-septilang}"]
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  # --- Summarization ---

  summarizer:
    container_name: mt-summarizer
    build:
      context: .
      dockerfile: services/summarizer/Dockerfile
    ports:
      - "8001:8001"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - config/.env
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8001/health').raise_for_status()"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # --- Storage ---

  postgres:
    container_name: mt-postgres
    image: postgres:16
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-meetings}
      - POSTGRES_USER=${POSTGRES_USER:-meetings}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./schema/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-meetings}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # --- Web API ---

  api:
    container_name: mt-api
    build:
      context: .
      dockerfile: services/api/Dockerfile
    ports:
      - "8080:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - config/.env
    depends_on:
      postgres:
        condition: service_healthy
      transcription:
        condition: service_healthy
      summarizer:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # --- Web Frontend ---

  web:
    container_name: mt-web
    build:
      context: services/web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
        NEXT_PUBLIC_AZURE_CLIENT_ID: ${NEXT_PUBLIC_AZURE_CLIENT_ID:-}
        NEXT_PUBLIC_AZURE_TENANT_ID: ${NEXT_PUBLIC_AZURE_TENANT_ID:-}
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  hf-cache:
  pgdata:
