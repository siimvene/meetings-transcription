# Nginx reverse proxy for meetings transcription service
# Place at /etc/nginx/sites-available/meetings-transcription

upstream api_backend {
    server localhost:8080;
}

upstream web_frontend {
    server localhost:3000;
}

server {
    listen 443 ssl;
    server_name meetings.your-domain.ee;

    ssl_certificate /etc/letsencrypt/live/meetings.your-domain.ee/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/meetings.your-domain.ee/privkey.pem;

    client_max_body_size 500M;  # Allow large audio file uploads

    # API endpoints
    location /health {
        proxy_pass http://api_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /transcripts {
        proxy_pass http://api_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /transcribe {
        proxy_pass http://api_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket endpoints (live transcript + audio streaming)
    location /ws/ {
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;  # Keep WS alive for long meetings
    }

    # Next.js frontend (default)
    location / {
        proxy_pass http://web_frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Next.js hot reload / internal WebSocket (dev only, harmless in prod)
    location /_next/webpack-hmr {
        proxy_pass http://web_frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

server {
    listen 80;
    server_name meetings.your-domain.ee;
    return 301 https://$host$request_uri;
}
