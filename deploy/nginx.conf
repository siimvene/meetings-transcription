# Nginx reverse proxy for meetings transcription service
# Place at /etc/nginx/sites-available/meetings-transcription

server {
    listen 443 ssl;
    server_name meetings.your-domain.ee;

    ssl_certificate /etc/letsencrypt/live/meetings.your-domain.ee/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/meetings.your-domain.ee/privkey.pem;

    client_max_body_size 500M;  # Allow large audio file uploads

    # API endpoints
    location / {
        proxy_pass http://localhost:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket for real-time transcription
    location /ws/ {
        proxy_pass http://localhost:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;  # Keep WS alive for long meetings
    }
}

server {
    listen 80;
    server_name meetings.your-domain.ee;
    return 301 https://$host$request_uri;
}
